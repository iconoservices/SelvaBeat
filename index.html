<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SelvaFlix | Tu Cine, Tu Naturaleza</title>
  <meta name="description" content="La mejor plataforma de streaming tropical. Películas, series y TV en vivo.">
</head>

<body>
  <div id="app">
    <nav class="navbar">
      <div class="logo">
        <span>SELVA</span><span>FLIX</span>
      </div>
      <ul class="nav-links">
        <li><a href="#" class="active">Inicio</a></li>
        <li><a href="#">Películas</a></li>
        <li><a href="#">Series</a></li>
        <li><a href="#">En Vivo</a></li>
      </ul>
      <div class="nav-actions">
        <input type="text" placeholder="Buscar en la selva..." class="search-bar">
        <div class="user-profile"></div>
      </div>
    </nav>

    <main id="home-view">
      <section class="hero" id="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <h1 class="hero-title" id="hero-title">Cocona Fugitiva</h1>
          <p class="hero-description" id="hero-desc">Descubre las historias mas jugosas del cine tropical.</p>
          <div class="hero-btns">
            <button class="btn btn-primary">Reproducir</button>
            <button class="btn btn-secondary">Mas Información</button>
          </div>
        </div>
      </section>

      <div class="content-sections" id="main-content">
        <!-- Rows will be injected here -->
      </div>
    </main>

    <!-- Admin View -->
    <section id="admin-view" class="admin-section">
      <div class="row-header">
        <h1 class="admin-title">🛠️ Oficina de Administracion</h1>
        <button class="btn btn-secondary" onclick="window.location.hash = ''">Volver a la Selva</button>
      </div>

      <div class="admin-grid">
        <!-- Add/Edit Form -->
        <div class="admin-card">
          <h2 class="admin-title">💾 Guardar Pelicula</h2>
          <form id="movie-form">
            <div class="form-group">
              <label>Título de la Película</label>
              <input type="text" id="m-title" class="form-control" placeholder="Ej: Selva de Cristal" required>
            </div>
            <div class="form-group">
              <label>URL de la Imagen (Póster)</label>
              <input type="url" id="m-img" class="form-control" placeholder="https://..." required>
            </div>
            <div class="form-group">
              <label>URL del Video (Embed)</label>
              <input type="url" id="m-embed" class="form-control" placeholder="https://youtube.com/embed/..." required>
            </div>
            <div class="form-group">
              <label>Año / Temporada</label>
              <input type="text" id="m-meta" class="form-control" placeholder="2024 o 1 Temporada">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Guardar en la Selva</button>
          </form>
        </div>

        <!-- Inventory Table -->
        <div class="admin-card" style="overflow-x: auto;">
          <h2 class="admin-title">📦 Inventario de Coconas</h2>
          <table class="admin-table">
            <thead>
              <tr>
                <th>Peli</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="inventory-list">
              <!-- Items injected here -->
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Premium Player Modal -->
    <div id="player-modal" class="player-modal">
      <div id="close-player" class="player-close">&times;</div>

      <div class="video-container">
        <!-- The Jungle Mist Loader -->
        <div id="player-loader" class="loader-overlay">
          <div class="loader-logo">SELVAFLIX</div>
          <div class="loader-text">Explorando la selva...</div>
        </div>

        <iframe id="player-iframe" src="" allowfullscreen></iframe>
      </div>
    </div>

    <nav class="mobile-nav">
      <a href="#" class="nav-item">🏠</a>
      <a href="#" class="nav-item">🎬</a>
      <a href="#" class="nav-item">📺</a>
      <a href="#" class="nav-item">🌐</a>
    </nav>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
